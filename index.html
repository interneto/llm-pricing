<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Pricing</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMTUiIGZpbGw9IiMyNTYzZWIiLz48cGF0aCBmaWxsPSIjZmZmIiBkPSJtMTYgNyAyIDcgNyAyLTcgMi0yIDctMi03LTctMiA3LTJaIi8+PC9zdmc+" />
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/main.js" type="module"></script>
</head>

<body>
  <div id="app">
    <div id="controls">
      <div id="controls-top">
        <select id="quality">
          <option value="overall">Overall</option>
          <option value="coding">Coding</option>
          <option value="hard">Hard</option>
        </select>
        <input id="model" placeholder="Filter">
        <span id="brand">LLM Pricing</span>
      </div>
      <div id="controls-slider">
        <label id="date-label" for="date">Month</label>
        <input type="range" id="date" min="0" max="100" step="1" value="100">
        <span class="legend">🟢 Best &nbsp; 🔴 Worst</span>
      </div>
    </div>
    <div id="chart-area">
      <div id="llm-cost"></div>
    </div>
  </div>

  <div id="scrolly-section"></div>
</body>

</html>
